<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond dégradé vert forêt -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2E1A"/>
      <stop offset="100%" style="stop-color:#2D6A4F"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6C90E"/>
      <stop offset="100%" style="stop-color:#F4A261"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52B788"/>
      <stop offset="100%" style="stop-color:#40916C"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Soleil levant -->
  <circle cx="256" cy="195" r="62" fill="url(#sun)" opacity="0.95"/>
  <!-- Rayons soleil -->
  <line x1="256" y1="108" x2="256" y2="88"  stroke="#F6C90E" stroke-width="10" stroke-linecap="round"/>
  <line x1="316" y1="128" x2="330" y2="114" stroke="#F6C90E" stroke-width="10" stroke-linecap="round"/>
  <line x1="336" y1="188" x2="356" y2="188" stroke="#F6C90E" stroke-width="10" stroke-linecap="round"/>
  <line x1="196" y1="128" x2="182" y2="114" stroke="#F6C90E" stroke-width="10" stroke-linecap="round"/>
  <line x1="176" y1="188" x2="156" y2="188" stroke="#F6C90E" stroke-width="10" stroke-linecap="round"/>

  <!-- Collines vertes -->
  <ellipse cx="150" cy="340" rx="160" ry="90" fill="#1B4332"/>
  <ellipse cx="370" cy="355" rx="175" ry="85" fill="#1B4332"/>
  <ellipse cx="256" cy="370" rx="200" ry="75" fill="#2D6A4F"/>

  <!-- Grande feuille centrale -->
  <path d="M256 420 C256 420 180 320 200 240 C215 175 256 155 256 155 C256 155 297 175 312 240 C332 320 256 420 256 420Z"
    fill="url(#leaf)" opacity="0.95"/>

  <!-- Nervure feuille -->
  <path d="M256 420 L256 200" stroke="#1B4332" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M256 300 C256 300 230 275 218 260" stroke="#1B4332" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M256 330 C256 330 282 305 294 290" stroke="#1B4332" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Épi de blé gauche -->
  <path d="M170 290 L155 220" stroke="#F6C90E" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="155" cy="215" rx="10" ry="16" fill="#F6C90E" transform="rotate(-15 155 215)"/>
  <ellipse cx="163" cy="235" rx="9" ry="14" fill="#F6C90E" transform="rotate(-10 163 235)"/>
  <ellipse cx="148" cy="238" rx="9" ry="14" fill="#F6C90E" transform="rotate(-20 148 238)"/>
  <ellipse cx="160" cy="255" rx="8" ry="13" fill="#F6C90E" transform="rotate(-12 160 255)"/>

  <!-- Épi de blé droit -->
  <path d="M342 290 L357 220" stroke="#F6C90E" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="357" cy="215" rx="10" ry="16" fill="#F6C90E" transform="rotate(15 357 215)"/>
  <ellipse cx="349" cy="235" rx="9" ry="14" fill="#F6C90E" transform="rotate(10 349 235)"/>
  <ellipse cx="364" cy="238" rx="9" ry="14" fill="#F6C90E" transform="rotate(20 364 238)"/>
  <ellipse cx="352" cy="255" rx="8" ry="13" fill="#F6C90E" transform="rotate(12 352 255)"/>

  <!-- Texte TF -->
  <text x="256" y="490" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="38"
    font-weight="900"
    fill="#B7E4C7"
    letter-spacing="4">
    TERREFRANCE
  </text>
</svg>
